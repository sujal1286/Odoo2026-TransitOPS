name: Odoo2026-TransitOPS

services:
  postgres:
    image: postgres
    container_name: Odoo2026-TransitOPS-postgres
    environment:
      POSTGRES_DB: Odoo2026-TransitOPS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - Odoo2026-TransitOPS_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  Odoo2026-TransitOPS_postgres_data:
