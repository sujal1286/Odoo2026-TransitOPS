# Docker Compose for Odoo2026-TransitOPS
# Full-stack container orchestration

name: Odoo2026-TransitOPS

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: Odoo2026-TransitOPS-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3001
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - Odoo2026-TransitOPS-network

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: Odoo2026-TransitOPS-server
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@db:5432/Odoo2026-TransitOPS
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - Odoo2026-TransitOPS-network

  db:
    image: postgres:16-alpine
    container_name: Odoo2026-TransitOPS-postgres
    environment:
      POSTGRES_DB: Odoo2026-TransitOPS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - Odoo2026-TransitOPS_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - Odoo2026-TransitOPS-network

networks:
  Odoo2026-TransitOPS-network:
    driver: bridge

volumes:
  Odoo2026-TransitOPS_postgres_data:
